<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS Portátil</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; transition: 0.5s; overflow: hidden; background: #1a1a1a; color: white; }
        .status-bar { height: 25px; background: rgba(0,0,0,0.6); display: flex; justify-content: space-between; padding: 0 15px; align-items: center; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, 90px); gap: 20px; padding: 40px; justify-content: center; }
        .app-item { text-align: center; cursor: pointer; animation: fadeIn 0.5s; }
        .icon { width: 70px; height: 70px; background: #333; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.2s; }
        .icon:active { transform: scale(0.9); }
        .label { font-size: 11px; margin-top: 8px; text-shadow: 1px 1px 2px black; }
        #window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 100; }
        .header { height: 50px; background: #222; color: white; display: flex; align-items: center; padding: 0 15px; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="os-bg">
    <div class="status-bar"><span id="hora">00:00</span><span>📶 🔋 100%</span></div>
    <div class="grid" id="desktop">
        <div class="app-item" onclick="abrir('loja.html', 'Play Store')"><div class="icon" style="background: linear-gradient(45deg, #2ecc71, #27ae60);">🛍️</div><div class="label">Loja</div></div>
        <div class="app-item" onclick="abrir('config.html', 'Ajustes')"><div class="icon" style="background: #7f8c8d;">⚙️</div><div class="label">Ajustes</div></div>
    </div>
    <div id="window">
        <div class="header"><button onclick="fechar()" style="padding: 8px 15px; background:#444; color:white; border:none; border-radius:5px; cursor:pointer;">⬅ VOLTAR</button><span id="win-title" style="margin-left: 20px;">App</span></div>
        <iframe id="win-frame" src=""></iframe>
    </div>
    <script>
        function atualizarHora() { document.getElementById('hora').innerText = new Date().toLocaleTimeString().slice(0,5); }
        setInterval(atualizarHora, 1000); atualizarHora();
        function abrir(url, titulo) {
            document.getElementById('win-title').innerText = titulo;
            document.getElementById('win-frame').src = url;
            document.getElementById('window').style.display = 'block';
        }
        function fechar() {
            document.getElementById('window').style.display = 'none';
            document.getElementById('win-frame').src = '';
            render(); 
        }
        function render() {
            document.getElementById('os-bg').style.backgroundColor = localStorage.getItem('bg-cor') || '#1a1a1a';
            const container = document.getElementById('desktop');
            document.querySelectorAll('.instalado').forEach(e => e.remove());
            const apps = JSON.parse(localStorage.getItem('meus-apps')) || [];
            apps.forEach((app) => {
                const div = document.createElement('div');
                div.className = 'app-item instalado';
                div.innerHTML = `<div class="icon" onclick="abrir('${app.url}', '${app.nome}')" style="background: #444;">${app.icon || '🎮'}</div><div class="label">${app.nome}</div>`;
                container.appendChild(div);
            });
        }
        window.onload = render;
    </script>
</body>
</html>
